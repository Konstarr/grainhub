<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3A2410" />

    <title>GrainHub — The Millwork & Cabinet Industry Community</title>
    <meta
      name="description"
      content="The modern community for millwork and cabinet professionals — industry news, expert forums, machinery marketplace, job board, and a living wiki. Free to join."
    />
    <meta name="keywords" content="millwork, cabinet making, woodworking, joinery, CNC, finishing, woodworking forum, cabinet industry" />
    <link rel="canonical" href="https://grainhub-brown.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GrainHub" />
    <meta property="og:title" content="GrainHub — The Millwork & Cabinet Industry Community" />
    <meta
      property="og:description"
      content="The modern community for millwork and cabinet professionals — news, forums, marketplace, job board, and a living wiki."
    />
    <meta property="og:url" content="https://grainhub-brown.vercel.app/" />
    <meta
      property="og:image"
      content="https://ozjtreaqyxlgsmopvwif.supabase.co/storage/v1/object/public/media/homepage/museums-victoria-U01ptiZV3Uo-unsplash.jpg"
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GrainHub — The Millwork & Cabinet Industry Community" />
    <meta
      name="twitter:description"
      content="The modern community for millwork and cabinet professionals."
    />
    <meta
      name="twitter:image"
      content="https://ozjtreaqyxlgsmopvwif.supabase.co/storage/v1/object/public/media/homepage/museums-victoria-U01ptiZV3Uo-unsplash.jpg"
    />

    <!-- Hint the browser to start fetching the hero photo right away
         so it's likely the LCP element on the homepage. -->
    <link
      rel="preload"
      as="image"
      href="https://ozjtreaqyxlgsmopvwif.supabase.co/storage/v1/object/public/media/homepage/museums-victoria-U01ptiZV3Uo-unsplash.jpg"
      fetchpriority="high"
    />

    <!-- Preconnect to Supabase + fonts so the first DB / image / font
         requests are already through the TLS handshake when JS fires. -->
    <link rel="preconnect" href="https://ozjtreaqyxlgsmopvwif.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
