<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3A2410" />

    <title>AWI Florida Chapter — Architectural Woodwork Institute</title>
    <meta
      name="description"
      content="The official online home of the AWI Florida Chapter — chapter events, member directory, technical resources, and forums for architectural woodwork professionals across Florida."
    />
    <meta name="keywords" content="AWI Florida, AWI Florida Chapter, Architectural Woodwork Institute, Florida millwork, Florida cabinetmakers, architectural woodwork, AWS standards, QCP" />
    <link rel="canonical" href="https://awiflorida.org/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AWI Florida Chapter" />
    <meta property="og:title" content="AWI Florida Chapter — Architectural Woodwork Institute" />
    <meta
      property="og:description"
      content="Chapter events, member directory, technical resources, and forums for architectural woodwork professionals across Florida."
    />
    <meta property="og:url" content="https://awiflorida.org/" />
    <meta
      property="og:image"
      content="https://ozjtreaqyxlgsmopvwif.supabase.co/storage/v1/object/public/media/homepage/museums-victoria-U01ptiZV3Uo-unsplash.jpg"
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AWI Florida Chapter" />
    <meta
      name="twitter:description"
      content="Chapter events, member directory, technical resources, and forums for Florida architectural woodwork professionals."
    />
    <meta
      name="twitter:image"
      content="https://ozjtreaqyxlgsmopvwif.supabase.co/storage/v1/object/public/media/homepage/museums-victoria-U01ptiZV3Uo-unsplash.jpg"
    />

    <!-- Hint the browser to start fetching the hero photo right away
         so it's likely the LCP element on the homepage. -->
    <link
      rel="preload"
      as="image"
      href="https://ozjtreaqyxlgsmopvwif.supabase.co/storage/v1/object/public/media/homepage/museums-victoria-U01ptiZV3Uo-unsplash.jpg"
      fetchpriority="high"
    />
    <!-- Preload the nav logo at the size we render it (height ~56px,
         2× for retina ≈ 760 wide on aspect 6.79:1). Served via Supabase
         image-transform so the byte payload is small. -->
    <link
      rel="preload"
      as="image"
      href="https://ozjtreaqyxlgsmopvwif.supabase.co/storage/v1/render/image/public/media/millwork_logo_transparent_1.png?width=760&resize=contain&quality=85"
      fetchpriority="high"
    />


    <!-- Preconnect to Supabase + fonts so the first DB / image / font
         requests are already through the TLS handshake when JS fires. -->
    <link rel="preconnect" href="https://ozjtreaqyxlgsmopvwif.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <!-- Metric-matched fallback so text barely shifts when Montserrat
         finally swaps in. Values match Arial → Montserrat metrics. -->
    <style>
      @font-face {
        font-family: "Montserrat Fallback";
        src: local("Arial");
        ascent-override: 86%;
        descent-override: 22%;
        line-gap-override: 0%;
        size-adjust: 113%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
