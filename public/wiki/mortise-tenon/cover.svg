<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Montserrat',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3d2615"/>
      <stop offset="100%" stop-color="#1c0f06"/>
    </linearGradient>
    <pattern id="wood-cover" patternUnits="userSpaceOnUse" width="30" height="30">
      <rect width="30" height="30" fill="#c9a47a"/>
      <path d="M0 8 Q 15 11, 30 8" stroke="#a07d4f" stroke-width="0.8" fill="none"/>
      <path d="M0 18 Q 15 21, 30 18" stroke="#8a6535" stroke-width="0.7" fill="none"/>
      <path d="M0 26 Q 15 28, 30 26" stroke="#a07d4f" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Big tenon piece coming in from the left -->
  <g transform="translate(150,260) rotate(-8)">
    <rect x="0" y="0" width="500" height="120" fill="url(#wood-cover)" stroke="#1c0f06" stroke-width="3"/>
    <rect x="500" y="20" width="240" height="80" fill="url(#wood-cover)" stroke="#1c0f06" stroke-width="3"/>
    <line x1="500" y1="0" x2="500" y2="120" stroke="#1c0f06" stroke-width="3"/>
  </g>

  <!-- Mortise piece -->
  <g transform="translate(880,140) rotate(6)">
    <rect x="0" y="0" width="160" height="320" fill="url(#wood-cover)" stroke="#1c0f06" stroke-width="3"/>
    <rect x="0" y="140" width="160" height="80" fill="#1c0f06"/>
  </g>

  <!-- Title block -->
  <text x="80" y="130" font-size="14" font-weight="600" fill="#ffd7ac" letter-spacing="3">GRAINHUB · WIKI</text>
  <text x="80" y="190" font-size="56" font-weight="700" fill="#fbf6ec">Mortise &amp; Tenon</text>
  <text x="80" y="240" font-size="22" fill="#e6d2b3" font-style="italic">The fundamental joint of woodworking</text>

  <text x="1170" y="582" font-size="11" text-anchor="end" fill="#a07d4f" font-style="italic">grainhub.io · CC BY-SA</text>
</svg>
