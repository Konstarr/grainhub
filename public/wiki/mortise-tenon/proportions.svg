<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Montserrat',sans-serif">
  <defs>
    <pattern id="w2" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#c9a47a"/>
      <path d="M0 5 Q 10 7, 20 5" stroke="#a07d4f" stroke-width="0.6" fill="none"/>
      <path d="M0 12 Q 10 14, 20 12" stroke="#a07d4f" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="#fbf6ec"/>
  <text x="400" y="32" font-size="20" font-weight="700" text-anchor="middle" fill="#2c1a0e">The 1/3 Rule</text>
  <text x="400" y="52" font-size="12" text-anchor="middle" fill="#6b5340">Tenon thickness = 1/3 of stock thickness, give or take</text>

  <!-- Cross-section of stock with tenon centered -->
  <g transform="translate(200,100)">
    <rect x="0" y="0" width="60" height="240" fill="url(#w2)" stroke="#5d3a1c" stroke-width="1.5"/>
    <!-- tenon (centered third) -->
    <rect x="60" y="80" width="100" height="80" fill="#a47a4d" stroke="#5d3a1c" stroke-width="1.5"/>

    <!-- thickness dim -->
    <line x1="-30" y1="0" x2="-30" y2="240" stroke="#2c1a0e" stroke-width="1"/>
    <line x1="-35" y1="0" x2="-25" y2="0" stroke="#2c1a0e" stroke-width="1"/>
    <line x1="-35" y1="240" x2="-25" y2="240" stroke="#2c1a0e" stroke-width="1"/>
    <text x="-50" y="125" font-size="13" text-anchor="middle" fill="#2c1a0e" font-weight="600" transform="rotate(-90, -50, 125)">Stock thickness · t</text>

    <!-- tenon thickness dim -->
    <line x1="180" y1="80" x2="180" y2="160" stroke="#9c1f1f" stroke-width="1"/>
    <line x1="175" y1="80" x2="185" y2="80" stroke="#9c1f1f" stroke-width="1"/>
    <line x1="175" y1="160" x2="185" y2="160" stroke="#9c1f1f" stroke-width="1"/>
    <text x="195" y="124" font-size="12" fill="#9c1f1f" font-weight="600">Tenon thickness</text>
    <text x="195" y="140" font-size="14" fill="#9c1f1f" font-weight="700">≈ t / 3</text>

    <!-- shoulder dim top -->
    <line x1="60" y1="80" x2="60" y2="0" stroke="#1f5d1f" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="100" y1="0" x2="100" y2="80" stroke="#1f5d1f" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="65" y="40" font-size="11" fill="#1f5d1f" font-weight="600">Shoulder = t/3</text>
  </g>

  <!-- Length / width rules text panel -->
  <g transform="translate(440,90)">
    <rect x="0" y="0" width="320" height="260" fill="#fff" stroke="#d4c4a8" stroke-width="1" rx="6"/>
    <text x="160" y="26" font-size="14" font-weight="700" text-anchor="middle" fill="#2c1a0e">Working proportions</text>

    <text x="20" y="60" font-size="12" font-weight="600" fill="#2c1a0e">Tenon thickness</text>
    <text x="20" y="76" font-size="11" fill="#6b5340">1/3 of stock thickness (round to nearest chisel size)</text>

    <text x="20" y="106" font-size="12" font-weight="600" fill="#2c1a0e">Tenon length (depth)</text>
    <text x="20" y="122" font-size="11" fill="#6b5340">2/3 to 3/4 of mortise piece thickness, blind</text>
    <text x="20" y="136" font-size="11" fill="#6b5340">Through tenon = full thickness + 1/16" proud</text>

    <text x="20" y="166" font-size="12" font-weight="600" fill="#2c1a0e">Tenon width</text>
    <text x="20" y="182" font-size="11" fill="#6b5340">≤ 5× thickness; split into twin tenons if wider</text>

    <text x="20" y="212" font-size="12" font-weight="600" fill="#2c1a0e">Shoulder reveal</text>
    <text x="20" y="228" font-size="11" fill="#6b5340">1/4" minimum on visible faces; 1/8" hidden</text>

    <text x="20" y="252" font-size="10" fill="#9c6b30" font-style="italic">See joint-calculator.xlsx for exact dims</text>
  </g>

  <text x="400" y="386" font-size="11" text-anchor="middle" fill="#6b5340" font-style="italic">
    Diagram: GrainHub Wiki · CC BY-SA · grainhub.io
  </text>
</svg>
